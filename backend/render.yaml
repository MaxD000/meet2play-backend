services:
  - type: web
    name: meet2play-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true        # Render génère automatiquement une clé sécurisée
      - key: DEV_MODE
        value: false
      - key: SMTP_HOST
        value: smtp-relay.brevo.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false                # À saisir manuellement dans le dashboard Render
      - key: SMTP_PASSWORD
        sync: false                # À saisir manuellement dans le dashboard Render
      - key: SMTP_FROM
        sync: false                # À saisir manuellement dans le dashboard Render
      - key: APP_URL
        value: https://meet2play-backend.onrender.com
